<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f7f0e6;
}

/* ===== GENERAL ===== */
.section {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.invite-card {
  width:90%;
  max-width:420px;
  background:#fffaf0;
  padding:40px 30px;
  border-radius:12px;
  text-align:center;
  border:1px solid rgba(212,175,55,0.4);
  box-shadow:0 30px 60px rgba(0,0,0,0.2);
}

/* ===== SCRATCH ===== */
.scratch-title {
  font-family:'Playfair Display', serif;
  font-size:2rem;
}

.scratch-sub {
  font-size:0.85rem;
  margin-bottom:20px;
}

.scratch-container {
  display:flex;
  gap:15px;
}

.box-wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.label {
  font-size:0.7rem;
  margin-bottom:5px;
}

.scratch-box {
  position:relative;
  width:90px;
  height:110px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #d4af37;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display', serif;
  font-size:1.2rem;
  background:#fff;
}

/* GOLD SCRATCH LAYER */
canvas {
  position:absolute;
  top:0;
  left:0;
}

/* sparkle */
.sparkle {
  position:absolute;
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  pointer-events:none;
  animation:fade 0.6s forwards;
}

@keyframes fade {
  to { opacity:0; transform:translateY(-10px); }
}

/* reveal glow */
.revealed {
  animation: glow 0.8s ease;
}

@keyframes glow {
  0% { box-shadow:0 0 0 transparent; }
  50% { box-shadow:0 0 20px rgba(212,175,55,0.6); }
  100% { box-shadow:0 0 0 transparent; }
}

</style>
</head>

<body>

<div class="section">
  <div class="invite-card">

    <div class="scratch-title">Save the Date</div>
    <div class="scratch-sub">Scratch below to reveal our wedding date</div>

    <div class="scratch-container">

      <div class="box-wrap">
        <div class="label">MONTH</div>
        <div class="scratch-box"><span>Nov</span><canvas></canvas></div>
      </div>

      <div class="box-wrap">
        <div class="label">DAY</div>
        <div class="scratch-box"><span>26</span><canvas></canvas></div>
      </div>

      <div class="box-wrap">
        <div class="label">YEAR</div>
        <div class="scratch-box"><span>2026</span><canvas></canvas></div>
      </div>

    </div>

  </div>
</div>

<script>
function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    const box = canvas.parentElement;
    canvas.width = box.offsetWidth;
    canvas.height = box.offsetHeight;

    const ctx = canvas.getContext("2d");

    /* GOLD TEXTURE */
    const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grad.addColorStop(0,"#d4af37");
    grad.addColorStop(1,"#f5e6a3");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation = "destination-out";

    let scratched = 0;

    function scratch(x,y){
      ctx.beginPath();
      ctx.arc(x,y,14,0,Math.PI*2);
      ctx.fill();

      scratched++;

      /* sparkles */
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      sparkle.style.left = x+"px";
      sparkle.style.top = y+"px";
      box.appendChild(sparkle);

      setTimeout(()=>sparkle.remove(),600);

      /* AUTO REVEAL */
      if(scratched > 120){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        box.classList.add("revealed");
      }
    }

    /* mouse */
    canvas.addEventListener("mousemove", e=>{
      if(e.buttons !== 1) return;
      const rect = canvas.getBoundingClientRect();
      scratch(e.clientX - rect.left, e.clientY - rect.top);
    });

    /* touch */
    canvas.addEventListener("touchmove", e=>{
      const rect = canvas.getBoundingClientRect();
      scratch(
        e.touches[0].clientX - rect.left,
        e.touches[0].clientY - rect.top
      );
    });

  });
}

initScratch();
</script>

</body>
</html>
