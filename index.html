<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<title>Karan ❤️ Pankti</title>  

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">  

<style>  
:root { --gold:#caa85a; }  

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

/* 🎞️ CINEMATIC BARS */
body::before, body::after{
  content:"";
  position:fixed;
  left:0;
  width:100%;
  height:35px;
  background:#000;
  z-index:9999;
}
body::before{ top:0; }
body::after{ bottom:0; }

/* 🎞️ FILM GRAIN */
body::after{
  background:
    url("https://www.transparenttextures.com/patterns/noise.png"),
    #000;
  opacity:0.08;
}

.section {
  min-height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  scroll-snap-align:start;
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  background:inherit;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

@keyframes breath { 50% { transform:scale(1.05); } }

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#b8954d);
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a,#b8954d);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.tap-text {
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:45px 28px;
  border-radius:18px;
  text-align:center;
  background:inherit;
  position:relative;
  box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

/* TEXT */
.script { font-family:'Great Vibes'; font-size:2.8rem; }

/* SWIPE */
.swipe {
  position:absolute;
  bottom:10px;
  cursor:pointer;
  animation:swipeMove 1.5s infinite;
}
@keyframes swipeMove { 50% { transform:translateY(10px); } }

/* SCRATCH */
.scratch-box {
  position:relative;
  height:105px;
  border:1px solid var(--gold);
}
canvas { position:absolute; inset:0; }

/* 🎬 VIDEO */
.cinematic-video {
  transition:transform 6s ease;
}
.cinematic-video.playing {
  transform:scale(1.05);
}

/* 🔊 OVERLAY */
#soundOverlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(6px);
  background:rgba(0,0,0,0.25);
  color:#fff;
  border-radius:14px;
  cursor:pointer;
  transition:opacity 0.6s;
}
</style>  
</head>  

<body>  

<audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1d05.mp3"></audio>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
  </div>
</div>

<div id="mainContent" style="display:none;">

<!-- SECTION 1 -->
<div class="section">
  <div class="invite-card">
    <div class="script">Karan</div>
    <div>Pankti</div>
  </div>
  <div class="swipe" onclick="scrollNext()">↓</div>
</div>

<!-- SECTION 2 -->
<div class="section" id="section2">
  <div class="invite-card" id="scratchCard">
    <div class="scratch-box">
      <span>Nov 26 2026</span>
      <canvas></canvas>
    </div>
  </div>
  <div class="swipe" onclick="scrollToVideo()">↓</div>
</div>

<!-- SECTION 3 (VIDEO) -->
<div class="section" id="section3">
  <div class="invite-card">
    <h2>A Glimpse of Our Journey</h2>

    <div style="position:relative;">
      <video id="weddingVideo" class="cinematic-video" muted loop playsinline>
        <source src="wedding.mp4" type="video/mp4">
      </video>

      <div id="soundOverlay" onclick="enableSound()">🔊 TAP FOR SOUND</div>
    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },1000);
}

function scrollNext(){
  document.getElementById("section2").scrollIntoView({behavior:"smooth"});
}

function scrollToVideo(){
  document.getElementById("section3").scrollIntoView({behavior:"smooth"});
}

/* 🔊 SOUND */
function enableSound(){
  let v=document.getElementById("weddingVideo");
  let o=document.getElementById("soundOverlay");

  v.muted=false;
  v.volume=0;
  v.play();

  let vol=0;
  let fade=setInterval(()=>{
    vol+=0.05;
    if(vol>=1){vol=1;clearInterval(fade);}
    v.volume=vol;
  },80);

  o.style.opacity="0";
  setTimeout(()=>o.style.display="none",600);
}

/* 🎥 VISIBILITY PLAY */
const video=document.getElementById("weddingVideo");

const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      video.play();
      video.classList.add("playing");
    } else {
      video.pause();
      video.classList.remove("playing");
    }
  });
},{threshold:0.6});

observer.observe(video);

/* SCRATCH */
function initScratch(){
  document.querySelectorAll("canvas").forEach(c=>{
    let ctx=c.getContext("2d");
    c.width=c.offsetWidth;
    c.height=c.offsetHeight;

    ctx.fillStyle="#d4af37";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.globalCompositeOperation="destination-out";

    c.addEventListener("touchmove",e=>{
      let r=c.getBoundingClientRect();
      let x=e.touches[0].clientX-r.left;
      let y=e.touches[0].clientY-r.top;
      ctx.beginPath();
      ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fill();
    });
  });
}
</script>

</body>
</html>
