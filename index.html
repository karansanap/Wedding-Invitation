<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}

/* ENVELOPE */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 10;
}

.envelope {
  width: 260px;
  height: 160px;
  background: #8B0000;
  position: relative;
  border: 2px solid gold;
  cursor: pointer;
}

/* flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #a00000;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 1s ease;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* text */
.envelope-text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 60%;
  color: gold;
  font-size: 1rem;
  letter-spacing: 2px;
}

/* Sections */
.section {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  transform: scale(1.2);
  transition: 1.5s;
  color: gold;
}

.section.active {
  opacity: 1;
  transform: scale(1);
}

/* Text animation */
.text {
  opacity: 0;
  transform: translateY(40px);
  animation: reveal 2s forwards;
}

.delay1 { animation-delay: 1s; }
.delay2 { animation-delay: 2s; }

@keyframes reveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 { font-size: 3rem; }
h2 { font-size: 1.6rem; }

/* Glow */
.glow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(212,175,55,0.1), transparent);
  animation: moveGlow 8s linear infinite;
  z-index: -2;
}

@keyframes moveGlow {
  0% { transform: translate(-50%, -50%); }
  100% { transform: translate(50%, 50%); }
}

/* Particles */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<!-- ENVELOPE SCREEN -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-text">Tap to Open</div>
  </div>
</div>

<div class="glow"></div>
<canvas id="particles"></canvas>

<!-- Scenes -->
<div class="section" id="s1">
  <h2 class="text">Two souls...</h2>
  <h2 class="text delay1">One beautiful journey...</h2>
</div>

<div class="section" id="s2">
  <h1 class="text delay1">Karan ❤️ Pankti</h1>
</div>

<div class="section" id="s3">
  <h2 class="text">Save The Date</h2>
  <h1 class="text delay1">26 November 2026</h1>
  <h2 class="text delay2">Mumbai</h2>
</div>

<div class="section" id="s4">
  <h2 class="text">Haldi 🌼</h2>
  <h2 class="text delay1">Mehendi 🌿</h2>
</div>

<div class="section" id="s5">
  <h2 class="text">Together with our families</h2>
  <h2 class="text delay1">We invite you to celebrate our love</h2>
</div>

<script>
let scenes = ["s1","s2","s3","s4","s5"];
let index = 0;

function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    playScenes();
  }, 1000);
}

function playScenes(){
  if(index > 0){
    document.getElementById(scenes[index-1]).classList.remove("active");
  }
  if(index < scenes.length){
    document.getElementById(scenes[index]).classList.add("active");
    index++;
    setTimeout(playScenes, 4500);
  }
}

/* Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<70;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#D4AF37";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
    }
  });
}

setInterval(draw,30);
</script>

</body>
</html>
