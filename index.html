<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f0e6;
  color: #5a3e2b;
  overflow-x: hidden;
}

/* ================= ENVELOPE ================= */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f7f0e6;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
  animation: breathe 4s ease-in-out infinite;
}

.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg,#c40000,#7a0000);
  border-radius: 8px;
  box-shadow:
    0 25px 50px rgba(0,0,0,0.3),
    inset 0 0 20px rgba(255,255,255,0.06);
}

.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background: linear-gradient(to bottom,#a00000,#5a0000);
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 3;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.seal {
  position: absolute;
  width: 65px;
  height: 65px;
  background: radial-gradient(circle,#b30000,#4a0000);
  border-radius: 50%;
  top: 70%;
  left: 50%;
  transform: translate(-50%,-50%);
  box-shadow:
    0 10px 18px rgba(0,0,0,0.4),
    inset 0 0 8px rgba(255,255,255,0.2);
}

.tap-text {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 0.75rem;
  letter-spacing: 2px;
  color: #f1d48a;
}

/* letter */
.letter {
  position: absolute;
  width: 90%;
  height: 160%;
  background: #fffaf0;
  top: 20%;
  left: 5%;
  border-radius: 5px;
  transform: translateY(100%);
  transition: transform 1s ease;
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

.envelope.open .letter {
  transform: translateY(-10%);
}

/* breathing */
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* ================= MAIN ================= */
#mainContent {
  display: none;
}

/* sections */
.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 60px 20px;

  opacity: 0;
  transform: translateY(60px) scale(0.98);
  transition: all 1.2s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* alternating colors */
.section:nth-child(odd) {
  background: #f7f0e6;
}

.section:nth-child(even) {
  background: #fff8ef;
}

/* typography */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  letter-spacing: 1px;
}

h2 {
  font-weight: 300;
  letter-spacing: 1px;
  margin: 8px 0;
}

p {
  max-width: 400px;
  line-height: 1.6;
}

</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="letter"></div>

    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>

  </div>
</div>

<!-- WEBSITE -->
<div id="mainContent">

  <div class="section">
    <h2>Two souls...</h2>
    <h2>One beautiful journey...</h2>
  </div>

  <div class="section">
    <h1>Karan ❤️ Pankti</h1>
  </div>

  <div class="section">
    <h2>Save The Date</h2>
    <h1>26 November 2026</h1>
    <h2>Mumbai</h2>
  </div>

  <div class="section">
    <h2>Haldi 🌼</h2>
    <h2>Mehendi 🌿</h2>
  </div>

  <div class="section">
    <h2>Venue</h2>
    <h1>Grand Celebration Hall</h1>
    <p>Mumbai, India</p>
  </div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    revealOnScroll(); // initial trigger
  }, 1200);
}

/* scroll animation */
function revealOnScroll(){
  const sections = document.querySelectorAll(".section");

  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("visible");
    }
  });
}

window.addEventListener("scroll", revealOnScroll);
</script>

</body>
</html>
