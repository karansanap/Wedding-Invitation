<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f7f0e6;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* ===== GOLD PARTICLES BACKGROUND ===== */
canvas#bg {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* ===== ENVELOPE ===== */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f7f0e6;
  z-index:999;
}

.envelope {
  width:340px;
  height:220px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

@keyframes breath {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.03); }
}

.envelope-body {
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#b30000,#6a0000);
  border-radius:10px;
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(#8b0000,#4d0000);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

.seal {
  position:absolute;
  width:65px;
  height:65px;
  background:radial-gradient(circle,#b30000,#4a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:52%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.75rem;
  letter-spacing:3px;
  color:#f1d48a;
}

/* ===== MAIN ===== */
#mainContent { display:none; position:relative; z-index:1; }

.section {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:start;
  position:relative;
}

/* cinematic fade */
.fade {
  opacity:0;
  transform:translateY(40px) scale(0.96);
  transition:all 1s ease;
}

.fade.show {
  opacity:1;
  transform:translateY(0) scale(1);
}

/* card */
.invite-card {
  width:90%;
  max-width:420px;
  background:#fffaf0;
  padding:35px 25px;
  border-radius:12px;
  text-align:center;
  border:1px solid rgba(212,175,55,0.4);
  box-shadow:0 30px 80px rgba(0,0,0,0.25);
  backdrop-filter:blur(6px);
}

/* typography */
.script { font-family:'Great Vibes', cursive; font-size:2.5rem; }
.small { font-size:0.7rem; letter-spacing:2px; }
.quote { font-size:0.85rem; font-style:italic; }

/* ===== SWIPE INDICATOR ===== */
.swipe {
  position:absolute;
  bottom:20px;
  font-size:0.7rem;
  opacity:0.6;
  animation:updown 1.5s infinite;
}

@keyframes updown {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(8px); }
}

/* ===== SCRATCH ===== */
.scratch-box {
  position:relative;
  width:80px;
  height:100px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid gold;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
}

canvas.scratch {
  position:absolute;
}

/* confetti */
.confetti {
  position:fixed;
  width:6px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall {
  to { transform:translateY(100vh) rotate(720deg); }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

  <!-- SECTION 1 -->
  <div class="section">
    <div class="invite-card fade" id="card1">
      <div class="quote">"Two souls, one journey."</div>
      <div class="script">Together With Their Families</div>
      <div class="small">REQUEST THE HONOUR</div>
    </div>
    <div class="swipe">Swipe ↑</div>
  </div>

  <!-- SECTION 2 -->
  <div class="section">
    <div class="invite-card fade" id="scratchCard">

      <div class="script">Save the Date</div>

      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <div class="scratch-box"><span>Nov</span><canvas class="scratch"></canvas></div>
        <div class="scratch-box"><span>26</span><canvas class="scratch"></canvas></div>
        <div class="scratch-box"><span>2026</span><canvas class="scratch"></canvas></div>
      </div>

    </div>
  </div>

</div>

<script>
/* OPEN */
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    document.getElementById("envelopeScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
    observe();
    initScratch();
  },1200);
}

/* FADE ON SCROLL */
function observe(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) e.target.classList.add("show");
    });
  });
  document.querySelectorAll(".fade").forEach(el=>obs.observe(el));
}

/* CONFETTI */
function confetti(){
  for(let i=0;i<60;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* SCRATCH */
function initScratch(){
  document.querySelectorAll(".scratch").forEach(canvas=>{
    let box=canvas.parentElement;
    canvas.width=box.offsetWidth;
    canvas.height=box.offsetHeight;
    let ctx=canvas.getContext("2d");

    let g=ctx.createLinearGradient(0,0,100,100);
    g.addColorStop(0,"#d4af37");
    g.addColorStop(1,"#f5e6a3");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let count=0,done=false;

    function scratch(x,y){
      if(done) return;
      ctx.beginPath();
      ctx.arc(x,y,12,0,Math.PI*2);
      ctx.fill();
      count++;

      if(count>100){
        done=true;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confetti();

        /* AUTO SCROLL */
        setTimeout(()=>{
          window.scrollTo({
            top:window.innerHeight*2,
            behavior:'smooth'
          });
        },800);
      }
    }

    canvas.addEventListener("mousemove",e=>{
      if(e.buttons!==1) return;
      let r=canvas.getBoundingClientRect();
      scratch(e.clientX-r.left,e.clientY-r.top);
    });

    canvas.addEventListener("touchmove",e=>{
      let r=canvas.getBoundingClientRect();
      scratch(
        e.touches[0].clientX-r.left,
        e.touches[0].clientY-r.top
      );
    });
  });
}

/* GOLD PARTICLES BG */
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");
bg.width=window.innerWidth;
bg.height=window.innerHeight;

let particles=[];
for(let i=0;i<40;i++){
  particles.push({
    x:Math.random()*bg.width,
    y:Math.random()*bg.height,
    r:Math.random()*2,
    dy:Math.random()*0.5+0.2
  });
}

function animate(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.fillStyle="rgba(212,175,55,0.5)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.dy;
    if(p.y>bg.height) p.y=0;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
