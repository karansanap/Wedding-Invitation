<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold1:#f5e6a3;
  --gold2:#e0c46c;
  --gold3:#caa85a;
  --gold4:#b8954d;
}

/* ===== BODY ===== */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
  overflow-x:hidden;
}

/* ===== ENVELOPE SCREEN ===== */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;

  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
}

/* ===== ENVELOPE ===== */
.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

@keyframes breath {
  50% { transform:scale(1.04); }
}

/* BODY */
.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;

  background:
    linear-gradient(145deg,var(--gold1),var(--gold2),var(--gold3),var(--gold2));

  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.7),
    inset 0 -6px 12px rgba(0,0,0,0.2),
    0 20px 40px rgba(0,0,0,0.2);
}

/* LIGHT REFLECTION */
.envelope-body::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );

  animation:shine 4s infinite;
}

@keyframes shine {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(100%); }
}

/* FLAP */
.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:
    linear-gradient(145deg,var(--gold2),var(--gold3),var(--gold4));

  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;

  box-shadow:inset 0 -4px 8px rgba(0,0,0,0.25);
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

/* WAX SEAL */
.seal {
  position:absolute;
  width:70px;
  height:70px;

  background:
    radial-gradient(circle at 30% 30%, #b30000, #5a0000);

  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);

  box-shadow:
    inset 0 3px 6px rgba(255,255,255,0.4),
    inset 0 -6px 10px rgba(0,0,0,0.4),
    0 6px 12px rgba(0,0,0,0.3);
}

/* TAP TEXT */
.tap-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
  color:#6b4f1d;
}

/* SUNRISE GLOW */
.glow {
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#fff3c4,transparent 60%);
  opacity:0;
  transition:1.2s;
}

.envelope.open .glow {
  opacity:1;
}

/* ===== MAIN CONTENT ===== */
#mainContent { display:none; }

/* SECTION */
.section {
  min-height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:40px 25px;
  border-radius:18px;
  text-align:center;

  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");

  box-shadow:
    0 30px 70px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);

  animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

/* TEXT */
.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
}

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:300px;
  margin:auto;
  text-align:center;
}

.scratch-box {
  position:relative;
  height:110px;
  border:1px solid var(--gold3);
  border-radius:12px;
  overflow:hidden;
}

.scratch-box canvas {
  position:absolute;
  inset:0;
}

/* FIRECRACKER */
.particle {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  animation:burst 1s forwards;
}

@keyframes burst {
  to {
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="glow"></div>
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<div class="section">
  <div class="invite-card">
    <div class="script">Karan & Pankti</div>
  </div>
</div>

<div class="section">
  <div class="invite-card" id="scratchCard">

    <h2>Save the Date</h2>

    <div class="scratch-wrapper">
      <div>MONTH</div><div>DAY</div><div>YEAR</div>

      <div class="scratch-box"><canvas></canvas></div>
      <div class="scratch-box"><canvas></canvas></div>
      <div class="scratch-box"><canvas></canvas></div>

      <div>SCRATCH</div><div>SCRATCH</div><div>SCRATCH</div>
    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
  },1200);
}
</script>

</body>
</html>
