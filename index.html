<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  color: gold;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}

/* Tap screen */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 10;
  cursor: pointer;
}

#startScreen h2 {
  animation: blink 1.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.4; }
}

/* Sections */
.section {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  transform: scale(1.1);
  transition: 1.5s ease;
}

.section.active {
  opacity: 1;
  transform: scale(1);
}

/* Text animation */
.fade {
  opacity: 0;
  animation: fadeIn 2s forwards;
}

.delay1 { animation-delay: 1s; }
.delay2 { animation-delay: 2s; }

@keyframes fadeIn {
  to { opacity: 1; }
}

h1 { font-size: 3rem; }
h2 { font-size: 1.8rem; }

/* Particles */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<!-- Tap to Start -->
<div id="startScreen" onclick="startExperience()">
  <h2>Tap to Open Invitation</h2>
</div>

<canvas id="particles"></canvas>

<!-- Scenes -->
<div class="section" id="s1">
  <h2 class="fade">Two souls...</h2>
  <h2 class="fade delay1">One beautiful journey...</h2>
</div>

<div class="section" id="s2">
  <h1 class="fade delay1">Karan ❤️ Pankti</h1>
</div>

<div class="section" id="s3">
  <h2 class="fade">Save The Date</h2>
  <h1 class="fade delay1">26 November 2026</h1>
  <h2 class="fade delay2">Mumbai</h2>
</div>

<div class="section" id="s4">
  <h2 class="fade">Haldi 🌼</h2>
  <h2 class="fade delay1">Mehendi 🌿</h2>
</div>

<div class="section" id="s5">
  <h2 class="fade">We can’t wait to celebrate with you</h2>
</div>

<script>
let scenes = ["s1","s2","s3","s4","s5"];
let index = 0;

function startExperience(){
  document.getElementById("startScreen").style.display = "none";
  playScenes();
}

function playScenes(){
  if(index > 0){
    document.getElementById(scenes[index-1]).classList.remove("active");
  }
  if(index < scenes.length){
    document.getElementById(scenes[index]).classList.add("active");
    index++;
    setTimeout(playScenes, 4000);
  }
}

/* Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "gold";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
    }
  });
}

setInterval(draw,30);
</script>

</body>
</html>
