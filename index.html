<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

/* BODY */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* GOLD ENVELOPE */
.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}
@keyframes breath { 50% { transform:scale(1.05); } }

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#e0c46c);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.7),
    inset 0 -6px 12px rgba(0,0,0,0.2),
    0 20px 40px rgba(0,0,0,0.25);
}

.envelope-body::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shine 4s infinite;
}
@keyframes shine {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(100%); }
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a,#b8954d);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}
.envelope.open .flap { transform:rotateX(180deg); }

.seal {
  position:absolute;
  width:70px;
  height:70px;
  background:radial-gradient(circle,#b30000,#5a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
  color:#6b4f1d;
}

/* MAIN */
#mainContent { display:none; }

.section {
  min-height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:50px 30px;
  border-radius:18px;
  position:relative;
  text-align:center;

  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");

  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(202,168,90,0.25);
}

/* EDGE DESIGN */
.invite-card::before {
  content:"";
  position:absolute;
  inset:12px;
  border-radius:12px;
  border:1px solid rgba(202,168,90,0.4);
}
.invite-card::after {
  content:"";
  position:absolute;
  inset:20px;
  border-radius:10px;
  border:1px solid rgba(202,168,90,0.25);
}

/* GANPATI */
.ganpati {
  width:52px;
  margin-bottom:15px;
  fill:url(#goldGradient);
}

/* TEXT */
.quote {
  font-size:0.85rem;
  font-style:italic;
  margin-bottom:25px;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.amp {
  font-size:1.6rem;
  color:var(--gold);
  margin:10px 0;
}

.swipe {
  position:absolute;
  bottom:12px;
  font-size:0.7rem;
  opacity:0.6;
}

/* SAVE DATE */
.save-title {
  font-family:'Playfair Display';
  font-size:1.6rem;
  margin-bottom:25px;
}

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  text-align:center;
}

.scratch-label {
  font-size:0.65rem;
  letter-spacing:3px;
  color:#8a7a65;
}

.scratch-box {
  position:relative;
  height:110px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.date-text {
  position:absolute;
  z-index:0;
  font-family:'Playfair Display';
  font-size:1.5rem;
}

canvas {
  position:absolute;
  inset:0;
  z-index:2;
}

.scratch-hint {
  font-size:0.6rem;
  letter-spacing:3px;
  color:#b39b6b;
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<!-- FIRST -->
<div class="section">
  <div class="invite-card">

    <svg class="ganpati" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="goldGradient">
          <stop offset="0%" stop-color="#f5e6a3"/>
          <stop offset="50%" stop-color="#caa85a"/>
          <stop offset="100%" stop-color="#f5e6a3"/>
        </linearGradient>
      </defs>
      <path d="M32 4c-8 0-14 6-14 14 0 4 2 8 5 10-2 2-3 5-3 8 0 7 6 12 12 12s12-5 12-12c0-3-1-6-3-8 3-2 5-6 5-10 0-8-6-14-14-14z"/>
    </svg>

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>

  </div>

  <div class="swipe">SWIPE ↓</div>
</div>

<!-- SAVE DATE -->
<div class="section">
  <div class="invite-card" id="scratchCard">

    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">

      <div class="scratch-label">MONTH</div>
      <div class="scratch-label">DAY</div>
      <div class="scratch-label">YEAR</div>

      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>

      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },1000);
}

function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let ctx=canvas.getContext("2d");
    canvas.width=canvas.parentElement.clientWidth;
    canvas.height=canvas.parentElement.clientHeight;

    ctx.fillStyle="#d4af37";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    canvas.addEventListener("touchmove",e=>{
      e.preventDefault();
      let r=canvas.getBoundingClientRect();
      let x=e.touches[0].clientX-r.left;
      let y=e.touches[0].clientY-r.top;

      ctx.beginPath();
      ctx.arc(x,y,15,0,Math.PI*2);
      ctx.fill();
    },{passive:false});
  });
}
</script>

</body>
</html>
