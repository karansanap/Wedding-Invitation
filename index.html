<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

/* BODY */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
}

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a);
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.seal {
  position:absolute;
  width:70px;
  height:70px;
  background:radial-gradient(circle,#b30000,#5a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
}

/* MAIN */
#mainContent { display:none; }

.section {
  min-height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== CARD ===== */
.invite-card {
  width:92%;
  max-width:420px;
  padding:50px 30px;
  border-radius:18px;
  position:relative;
  text-align:center;

  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");

  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(202,168,90,0.25),
    inset 0 8px 20px rgba(0,0,0,0.05);
}

/* ===== FOIL BORDER ===== */
.invite-card::before {
  content:"";
  position:absolute;
  inset:12px;
  border-radius:12px;
  padding:1px;

  background:
    linear-gradient(120deg,
      rgba(255,255,255,0.2),
      rgba(202,168,90,0.8),
      rgba(255,255,255,0.2)
    );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;

  animation:foilMove 4s infinite linear;
}

/* INNER FOIL */
.invite-card::after {
  content:"";
  position:absolute;
  inset:20px;
  border-radius:10px;
  padding:1px;

  background:
    linear-gradient(120deg,
      rgba(255,255,255,0.1),
      rgba(202,168,90,0.6),
      rgba(255,255,255,0.1)
    );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;

  animation:foilMove 6s infinite linear;
}

@keyframes foilMove {
  0% { background-position:-200px 0; }
  100% { background-position:200px 0; }
}

/* TEXT */
.symbol { font-size:26px; margin-bottom:15px; }

.quote {
  font-size:0.85rem;
  font-style:italic;
  color:#6a6a6a;
  margin-bottom:25px;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.amp {
  font-size:1.6rem;
  color:var(--gold);
  margin:10px 0;
}

/* SAVE DATE */
.save-title {
  font-family:'Playfair Display', serif;
  margin-bottom:30px;
}

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  max-width:320px;
  margin:auto;
  text-align:center;
}

.scratch-label {
  font-size:0.65rem;
  letter-spacing:3px;
}

.scratch-box {
  position:relative;
  height:110px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.date-text {
  position:absolute;
  z-index:0;
  font-family:'Playfair Display', serif;
  font-size:1.5rem;
}

.scratch-box canvas {
  position:absolute;
  inset:0;
  z-index:2;
}

.scratch-hint {
  font-size:0.6rem;
  letter-spacing:3px;
}

</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<div class="section">
  <div class="invite-card">

    <div class="symbol">ੴ</div>

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>

  </div>
</div>

<div class="section">
  <div class="invite-card">

    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">

      <div class="scratch-label">MONTH</div>
      <div class="scratch-label">DAY</div>
      <div class="scratch-label">YEAR</div>

      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>

      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
  },1000);
}
</script>

</body>
</html>
