<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f0e6;
  color: #5a3e2b;
  overflow-x: hidden;
}

/* LIGHT */
.light {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,220,150,0.8), transparent 70%);
  opacity: 0;
  z-index: 500;
}

.light.active {
  animation: lightBurst 1.2s ease;
}

@keyframes lightBurst {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.9; }
  100% { opacity: 0; transform: scale(1.6); }
}

/* ENVELOPE */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
}

.envelope-body {
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg,#b30000,#6a0000);
  border-radius: 10px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background: linear-gradient(#8b0000,#4d0000);
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: 1.2s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.seal {
  position: absolute;
  width: 65px;
  height: 65px;
  background: radial-gradient(circle,#b30000,#4a0000);
  border-radius: 50%;
  top: 70%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.tap-text {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 0.75rem;
  letter-spacing: 3px;
  color: #f1d48a;
}

/* MAIN */
#mainContent {
  display: none;
}

/* CARD STYLE (REUSABLE) */
.card-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.invite-card {
  width: 90%;
  max-width: 420px;
  background: #fffaf0;
  padding: 40px 30px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid rgba(212,175,55,0.4);
  box-shadow: 0 30px 60px rgba(0,0,0,0.2);
}

/* FIRST CARD ANIMATION */
.invite-card.first {
  opacity: 0;
  transform: translateY(120px) scale(0.9);
}

.invite-card.first.show {
  animation: cardReveal 1.4s ease forwards;
}

@keyframes cardReveal {
  0% { opacity: 0; transform: translateY(120px) scale(0.9); }
  60% { opacity: 1; transform: translateY(-10px) scale(1.02); }
  100% { transform: translateY(0) scale(1); }
}

/* TEXT */
.quote {
  font-size: 0.9rem;
  font-style: italic;
  margin-bottom: 20px;
}

.script {
  font-family: 'Great Vibes', cursive;
  font-size: 2.5rem;
  margin: 20px 0;
}

.small {
  font-size: 0.75rem;
  letter-spacing: 2px;
  opacity: 0.7;
}

.amp {
  font-size: 1.8rem;
  margin: 15px 0;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
}

</style>
</head>

<body>

<div class="light" id="light"></div>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

  <!-- FIRST CARD -->
  <div class="card-section">
    <div class="invite-card first" id="card1">

      <div class="quote">
        "They alone are called husband and wife,<br>
        who have one soul in two bodies."<br>
        — Guru Amar Das Ji
      </div>

      <div class="script">Together With Their Families</div>

      <div class="small">REQUEST THE HONOUR OF YOUR PRESENCE</div>

      <div class="amp">&</div>

      <div class="script">On This Auspicious Occasion</div>

      <div class="small">TO CELEBRATE LOVE & UNION</div>

    </div>
  </div>

  <!-- SECOND CARD (YOUR MAIN INFO) -->
  <div class="card-section">
    <div class="invite-card">

      <div class="script">Karan ❤️ Pankti</div>

      <div class="small">ARE GETTING MARRIED</div>

      <div class="amp">•</div>

      <h1>26 November 2026</h1>

      <div class="small">MUMBAI</div>

    </div>
  </div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("light").classList.add("active");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    setTimeout(() => {
      document.getElementById("card1").classList.add("show");
    }, 200);

  }, 1200);
}
</script>

</body>
</html>
