<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f7f0e6;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}

/* 🌅 SUNRISE EFFECT */
#sunrise {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: radial-gradient(circle at center,
    rgba(255, 230, 170, 0) 0%,
    rgba(255, 200, 120, 0) 50%,
    rgba(247, 240, 230, 1) 100%);
  z-index: 0;
  transition: 1.5s ease;
}

#sunrise.active {
  background: radial-gradient(circle at center,
    rgba(255, 230, 170, 0.85) 0%,
    rgba(255, 200, 120, 0.4) 50%,
    rgba(247, 240, 230, 1) 100%);
}

/* 📦 ENVELOPE SCREEN */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* 🔍 ZOOM WRAPPER */
.zoomWrapper {
  transform: scale(1);
  transition: transform 1.2s ease;
}

.zoomWrapper.zoom {
  transform: scale(1.25);
}

/* 🧧 HERO ENVELOPE */
.envelope {
  position: relative;

  width: 160vw;
  max-width: 900px;

  height: calc(160vw * 0.6);
  max-height: 540px;

  cursor: pointer;

  animation: breathe 4s ease-in-out infinite;
}

/* breathing */
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* 📮 BODY */
.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #c40000, #8b0000);
  border: 5px solid #D4AF37;
  border-radius: 14px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.25),
    inset 0 0 25px rgba(255,255,255,0.08);
}

/* 📩 FLAP */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60%;
  background: linear-gradient(to bottom, #a00000, #6e0000);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 2;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* 🔴 WAX SEAL (NO TEXT) */
.seal {
  position: absolute;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, #b30000, #4a0000);
  border: 2px solid gold;
  border-radius: 50%;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 25px rgba(212,175,55,0.6);
  z-index: 3;
}

/* ✨ CENTER TEXT */
.envelope-text {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;

  color: #D4AF37;
  font-size: 1.5rem;
  letter-spacing: 2px;
  z-index: 5;
  pointer-events: none;
}

/* 🎬 SCENES */
.section {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  opacity: 0;
  transform: scale(1.15);
  transition: 1.5s ease;

  color: #8B5E3C;
  text-align: center;
}

.section.active {
  opacity: 1;
  transform: scale(1);
}

.text {
  opacity: 0;
  transform: translateY(40px);
  animation: reveal 2s forwards;
}

.delay1 { animation-delay: 1s; }
.delay2 { animation-delay: 2s; }

@keyframes reveal {
  to { opacity: 1; transform: translateY(0); }
}

/* 🌟 PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<div id="sunrise"></div>

<!-- 🧧 ENVELOPE -->
<div id="envelopeScreen">
  <div class="zoomWrapper">
    <div class="envelope" onclick="openEnvelope()">

      <div class="flap"></div>
      <div class="envelope-body"></div>
      <div class="seal"></div>

      <div class="envelope-text">
        Tap to Reveal Invitation
      </div>

    </div>
  </div>
</div>

<canvas id="particles"></canvas>

<!-- 🎬 SCENES -->
<div class="section" id="s1">
  <h2 class="text">Two souls...</h2>
  <h2 class="text delay1">One beautiful journey...</h2>
</div>

<div class="section" id="s2">
  <h1 class="text delay1">Karan ❤️ Pankti</h1>
</div>

<div class="section" id="s3">
  <h2 class="text">Save The Date</h2>
  <h1 class="text delay1">26 November 2026</h1>
  <h2 class="text delay2">Mumbai</h2>
</div>

<div class="section" id="s4">
  <h2 class="text">Haldi 🌼</h2>
  <h2 class="text delay1">Mehendi 🌿</h2>
</div>

<div class="section" id="s5">
  <h2 class="text">Together with our families</h2>
  <h2 class="text delay1">We invite you to celebrate our love</h2>
</div>

<script>
let scenes = ["s1","s2","s3","s4","s5"];
let index = 0;

function openEnvelope(){

  document.querySelector(".zoomWrapper").classList.add("zoom");
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("sunrise").classList.add("active");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    playScenes();
  }, 1200);
}

function playScenes(){
  if(index > 0){
    document.getElementById(scenes[index-1]).classList.remove("active");
  }
  if(index < scenes.length){
    document.getElementById(scenes[index]).classList.add("active");
    index++;
    setTimeout(playScenes, 4600);
  }
}

/* particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.8,
    d: Math.random()*0.7
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#D4AF37";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height) p.y = 0;
  });
}

setInterval(draw,30);
</script>

</body>
</html>
