<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

/* BODY */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
  overflow-x:hidden;
}

/* ENVELOPE SCREEN */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
}

/* ENVELOPE */
.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}
@keyframes breath { 50% { transform:scale(1.04); } }

.envelope-body {
  width:100%; height:100%; border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#e0c46c);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.7),
    inset 0 -6px 12px rgba(0,0,0,0.2),
    0 20px 40px rgba(0,0,0,0.2);
}
.envelope-body::after {
  content:""; position:absolute; inset:0; border-radius:14px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shine 4s infinite;
}
@keyframes shine {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(100%); }
}

.flap {
  position:absolute; width:100%; height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a,#b8954d);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}
.envelope.open .flap { transform:rotateX(180deg); }

.seal {
  position:absolute; width:70px; height:70px;
  background:radial-gradient(circle,#b30000,#5a0000);
  border-radius:50%;
  top:70%; left:50%; transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem; letter-spacing:3px;
  color:#6b4f1d;
}

.glow {
  position:absolute; width:100%; height:100%;
  background:radial-gradient(circle,#fff3c4,transparent 60%);
  opacity:0; transition:1.2s;
}
.envelope.open .glow { opacity:1; }

/* MAIN */
#mainContent { display:none; }

/* SECTION */
.section {
  min-height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  position:relative;
}

/* CARD */
.invite-card {
  width:92%; max-width:420px;
  padding:40px 25px;
  border-radius:18px;
  text-align:center;
  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

/* TEXT */
.symbol { font-size:26px; margin-bottom:15px; }

.quote {
  font-size:0.85rem;
  font-style:italic;
  color:#6a6a6a;
  margin-bottom:25px;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.amp {
  font-size:1.6rem;
  color:var(--gold);
  margin:10px 0;
}

.swipe {
  position:absolute;
  bottom:10px;
  font-size:0.7rem;
  opacity:0.6;
}

/* SAVE THE DATE */
.save-title {
  font-family:'Playfair Display', serif;
  font-weight:500;
  letter-spacing:1px;
  margin-bottom:30px;
  font-size:1.6rem;
}

.scratch-wrapper {
  width:100%;
  max-width:320px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  text-align:center;
}

.scratch-label {
  font-size:0.65rem;
  letter-spacing:3px;
  color:#8a7a65;
}

/* FIXED LAYERING */
.scratch-box {
  position:relative;
  height:110px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.date-text {
  position:absolute;
  z-index:0; /* BELOW */
  font-family:'Playfair Display', serif;
  font-size:1.5rem;
}

.scratch-box canvas {
  position:absolute;
  inset:0;
  z-index:2; /* ABOVE */
}

.scratch-hint {
  font-size:0.6rem;
  letter-spacing:3px;
  color:#b39b6b;
}

/* FIRECRACKER */
.particle {
  position:absolute;
  width:5px; height:5px;
  border-radius:50%;
  animation:burst 1s forwards;
}
@keyframes burst {
  to { transform:translate(var(--x), var(--y)); opacity:0; }
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="glow"></div>
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<!-- FIRST -->
<div class="section">
  <div class="invite-card">

    <div class="symbol">ੴ</div>

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>

  </div>

  <div class="swipe">SWIPE ↓</div>
</div>

<!-- SAVE DATE -->
<div class="section">
  <div class="invite-card" id="scratchCard">

    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">

      <div class="scratch-label">MONTH</div>
      <div class="scratch-label">DAY</div>
      <div class="scratch-label">YEAR</div>

      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>

      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },1200);
}

function firecracker(origin){
  for(let i=0;i<35;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*2*Math.PI;
    let dist=60+Math.random()*50;

    p.style.setProperty('--x', Math.cos(angle)*dist+'px');
    p.style.setProperty('--y', Math.sin(angle)*dist+'px');

    p.style.background=`hsl(${Math.random()*40+20},70%,65%)`;

    origin.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let box=canvas.parentElement;

    canvas.width=box.clientWidth;
    canvas.height=box.clientHeight;

    let ctx=canvas.getContext("2d");

    let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g.addColorStop(0,"#d4af37");
    g.addColorStop(1,"#f5e6a3");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let count=0,done=false,isScratching=false;

    function scratch(x,y){
      if(done) return;

      ctx.beginPath();
      ctx.arc(x,y,14,0,Math.PI*2);
      ctx.fill();

      count++;

      if(count>120){
        done=true;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        firecracker(document.getElementById("scratchCard"));
      }
    }

    canvas.addEventListener("touchstart",()=>{
      isScratching=true;
      document.body.style.overflow="hidden";
    },{passive:false});

    canvas.addEventListener("touchend",()=>{
      isScratching=false;
      document.body.style.overflow="auto";
    });

    canvas.addEventListener("touchmove",e=>{
      if(!isScratching) return;
      e.preventDefault();

      let r=canvas.getBoundingClientRect();
      scratch(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
    },{passive:false});
  });
}
</script>

</body>
</html>
