<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

.section {
  min-height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  scroll-snap-align:start;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:45px 28px;
  border-radius:18px;
  text-align:center;
  background:inherit;
  position:relative;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(202,168,90,0.25);
}

/* EDGE */
.invite-card::before,
.invite-card::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1.5px;
  background:linear-gradient(120deg,transparent,#caa85a,transparent);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

.invite-card::before { animation:edgeMove 4s linear infinite; }
.invite-card::after { animation:edgeMove 6s linear infinite reverse; }

@keyframes edgeMove {
  0% { background-position:-200px; }
  100% { background-position:200px; }
}

/* GANPATI */
.ganpati {
  width:52px;
  margin-bottom:15px;
  fill:url(#goldGradient);
  animation:ganpatiFloat 3s ease-in-out infinite;
}
@keyframes ganpatiFloat {
  50% { transform:translateY(-6px); }
}

/* TEXT */
.quote { font-size:0.85rem; margin-bottom:25px; font-style:italic; }
.script { font-family:'Great Vibes'; font-size:2.8rem; }
.parents { font-size:0.7rem; letter-spacing:2px; color:#8a7a65; }

.swipe {
  position:absolute;
  bottom:10px;
  font-size:0.7rem;
  opacity:0.6;
  animation:swipeMove 1.5s infinite;
  cursor:pointer;
}
@keyframes swipeMove {
  50% { transform:translateY(10px); }
}

/* SAVE DATE */
.save-title { font-family:'Playfair Display'; margin-bottom:20px; }

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  text-align:center;
}

.scratch-box {
  position:relative;
  height:105px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
}

.date-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:1.5rem;
}

canvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:2;
}

/* 🎬 VIDEO SECTION */
.video-section {
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.video-section.visible {
  opacity:1;
  transform:translateY(0);
}

.video-title {
  font-family:'Playfair Display';
  font-size:1.6rem;
  margin-bottom:20px;
}

video {
  width:100%;
  max-width:420px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* FIREWORK */
.particle {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:burst 1s forwards;
}
@keyframes burst {
  to { transform:translate(var(--x),var(--y)); opacity:0; }
}
</style>
</head>

<body>

<audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1d05.mp3"></audio>

<div id="mainContent">

<!-- SECTION 1 -->
<div class="section" id="section1">
  <div class="invite-card">
    <svg class="ganpati" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="goldGradient">
          <stop offset="0%" stop-color="#f5e6a3"/>
          <stop offset="50%" stop-color="#caa85a"/>
          <stop offset="100%" stop-color="#f5e6a3"/>
        </linearGradient>
      </defs>
      <path d="M32 4c-8 0-14 6-14 14 0 4 2 8 5 10-2 2-3 5-3 8 0 7 6 12 12 12s12-5 12-12c0-3-1-6-3-8 3-2 5-6 5-10 0-8-6-14-14-14z"/>
    </svg>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>
  </div>

  <div class="swipe" onclick="scrollNext()">SWIPE ↓</div>
</div>

<!-- SECTION 2 -->
<div class="section" id="section2">
  <div class="invite-card" id="scratchCard">

    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">
      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>
    </div>

  </div>
</div>

<!-- 🎬 SECTION 3 (VIDEO) -->
<div class="section">
  <div class="invite-card video-section" id="videoSection">

    <div class="video-title">A Glimpse of Our Journey</div>

    <video autoplay muted loop playsinline>
      <source src="wedding.mp4" type="video/mp4">
    </video>

  </div>
</div>

</div>

<script>
function scrollNext(){
  document.getElementById("section2").scrollIntoView({behavior:"smooth"});
}

/* 🎬 VIDEO FADE-IN */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
});
observer.observe(document.getElementById("videoSection"));

/* FIREWORK */
function firecracker(origin){
  let rect = origin.getBoundingClientRect();
  for(let i=0;i<70;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*2*Math.PI;
    let dist=100+Math.random()*80;

    p.style.left = rect.width/2 + "px";
    p.style.top = rect.height/2 + "px";

    p.style.setProperty('--x',Math.cos(angle)*dist+'px');
    p.style.setProperty('--y',Math.sin(angle)*dist+'px');

    origin.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}
</script>

</body>
</html>
