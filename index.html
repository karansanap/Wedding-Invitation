<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

.section {
  min-height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  scroll-snap-align:start;
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  background:inherit;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

.envelope::before {
  content:"";
  position:absolute;
  inset:-30px;
  border-radius:20px;
  background:radial-gradient(circle, rgba(202,168,90,0.35), transparent 70%);
  filter:blur(20px);
  z-index:-1;
}

@keyframes breath { 50% { transform:scale(1.05); } }

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#b8954d);
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a,#b8954d);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.tap-text {
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:45px 28px;
  border-radius:18px;
  text-align:center;
  background:inherit;
}

/* TEXT */
.script { font-family:'Great Vibes'; font-size:2.8rem; }
.parents { font-size:0.7rem; letter-spacing:2px; }

/* SWIPE */
.swipe {
  position:absolute;
  bottom:10px;
  cursor:pointer;
}

/* SCRATCH */
.scratch-box {
  position:relative;
  height:105px;
  border:1px solid var(--gold);
}

canvas {
  position:absolute;
  inset:0;
}

/* VIDEO */
video {
  width:100%;
  max-width:420px;
  border-radius:14px;
}
</style>
</head>

<body>

<audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1d05.mp3"></audio>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
  </div>
</div>

<div id="mainContent" style="display:none;">

<!-- SECTION 1 -->
<div class="section" id="section1">
  <div class="invite-card">
    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>
  </div>

  <div class="swipe" onclick="scrollNext()">SWIPE ↓</div>
</div>

<!-- SECTION 2 -->
<div class="section" id="section2">
  <div class="invite-card" id="scratchCard">
    <div class="scratch-box">
      <span>Nov 26 2026</span>
      <canvas></canvas>
    </div>
  </div>
</div>

<!-- SECTION 3 -->
<div class="section">
  <div class="invite-card">
    <h2>A Glimpse of Our Journey</h2>
    <video autoplay muted loop playsinline>
      <source src="wedding.mp4" type="video/mp4">
    </video>
  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(()=>{
    document.getElementById("envelopeScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
    initScratch();
  },1000);
}

function scrollNext(){
  document.getElementById("section2").scrollIntoView({behavior:"smooth"});
}

function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let ctx=canvas.getContext("2d");
    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;

    ctx.fillStyle="#d4af37";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    canvas.addEventListener("touchmove",e=>{
      let r=canvas.getBoundingClientRect();
      let x=e.touches[0].clientX-r.left;
      let y=e.touches[0].clientY-r.top;

      ctx.beginPath();
      ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fill();
    });
  });
}
</script>

</body>
</html>
