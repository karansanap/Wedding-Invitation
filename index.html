<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f7f0e6;
  color: #5a3e2b;
  overflow-x: hidden;
}

/* cinematic glow layer */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at center, rgba(255,220,150,0.15), transparent 60%);
  z-index: -1;
}

/* ================= ENVELOPE ================= */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f7f0e6;
  z-index: 999;
  transition: opacity 1.2s ease;
}

.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
  animation: breathe 4s ease-in-out infinite;
}

.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg,#b30000,#6a0000);
  border-radius: 10px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.4),
    inset 0 0 25px rgba(255,255,255,0.05);
}

.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background: linear-gradient(to bottom,#8b0000,#4d0000);
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: transform 1.2s ease;
  z-index: 3;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.seal {
  position: absolute;
  width: 65px;
  height: 65px;
  background: radial-gradient(circle,#b30000,#4a0000);
  border-radius: 50%;
  top: 70%;
  left: 50%;
  transform: translate(-50%,-50%);
  box-shadow:
    0 12px 25px rgba(0,0,0,0.5),
    inset 0 0 10px rgba(255,255,255,0.2);
}

/* shimmer */
.tap-text {
  position: absolute;
  top: 52%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 0.75rem;
  letter-spacing: 3px;
  color: #f1d48a;
  z-index: 6;
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* letter */
.letter {
  position: absolute;
  width: 90%;
  height: 160%;
  background: #fffaf0;
  top: 20%;
  left: 5%;
  border-radius: 6px;
  transform: translateY(100%);
  transition: transform 1.2s ease;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

.envelope.open .letter {
  transform: translateY(-10%);
}

@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* ================= MAIN ================= */
#mainContent {
  display: none;
}

/* cinematic sections */
.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 80px 20px;

  opacity: 0;
  transform: translateY(80px) scale(0.97);
  filter: blur(8px);

  transition: all 1.6s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

/* gold divider */
.divider {
  width: 100px;
  height: 2px;
  background: linear-gradient(to right, transparent, #D4AF37, transparent);
  margin: 25px 0;
}

/* typography */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.4rem;
  letter-spacing: 1px;
}

h2 {
  font-weight: 300;
  letter-spacing: 1px;
  margin: 8px 0;
}

/* ================= LIGHT SWEEP ================= */
.light {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,220,150,0.8), transparent 70%);
  opacity: 0;
  pointer-events: none;
  z-index: 500;
}

.light.active {
  animation: lightSweep 1.2s ease;
}

@keyframes lightSweep {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; }
  100% { opacity: 0; transform: scale(1.5); }
}

</style>
</head>

<body>

<div class="light" id="light"></div>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="letter"></div>

    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>

  </div>
</div>

<!-- WEBSITE -->
<div id="mainContent">

  <div class="section">
    <h2>Two souls...</h2>
    <div class="divider"></div>
    <h2>One beautiful journey...</h2>
  </div>

  <div class="section">
    <h1>Karan ❤️ Pankti</h1>
    <div class="divider"></div>
  </div>

  <div class="section">
    <h2>Save The Date</h2>
    <div class="divider"></div>
    <h1>26 November 2026</h1>
    <h2>Mumbai</h2>
  </div>

  <div class="section">
    <h2>Haldi 🌼</h2>
    <div class="divider"></div>
    <h2>Mehendi 🌿</h2>
  </div>

  <div class="section">
    <h2>Venue</h2>
    <div class="divider"></div>
    <h1>Grand Celebration Hall</h1>
    <p>Mumbai, India</p>
  </div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("light").classList.add("active");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.opacity = "0";
  }, 500);

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    revealOnScroll();
  }, 1300);
}

/* cinematic scroll */
function revealOnScroll(){
  const sections = document.querySelectorAll(".section");

  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 120){
      sec.classList.add("visible");
    }
  });
}

window.addEventListener("scroll", revealOnScroll);
</script>

</body>
</html>
