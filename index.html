<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f6efe6;
  color:#444;
}

/* ===== ENVELOPE ===== */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f6efe6;
  z-index:999;
}

.envelope {
  width:340px;
  height:220px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

@keyframes breath {
  50% { transform:scale(1.04); }
}

.envelope-body {
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#a30000,#5c0000);
  border-radius:10px;
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(#7a0000,#3a0000);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

.seal {
  position:absolute;
  width:65px;
  height:65px;
  background:radial-gradient(circle,#b30000,#4a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:52%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
  color:#f1d48a;
}

/* ===== SECTIONS ===== */
#mainContent { display:none; }

.section {
  min-height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

/* ===== CARD ===== */
.invite-card {
  width:92%;
  max-width:420px;
  background:#fffdf8;
  padding:45px 25px;
  border-radius:18px;
  text-align:center;
  position:relative;
  box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

/* GOLD CORNERS */
.invite-card:before,
.invite-card:after {
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  border:1px solid #d4af37;
}

.invite-card:before {
  top:15px;
  left:15px;
  border-right:none;
  border-bottom:none;
}

.invite-card:after {
  bottom:15px;
  right:15px;
  border-left:none;
  border-top:none;
}

/* ===== TEXT ===== */
.symbol {
  font-size:26px;
  margin-bottom:15px;
}

.quote {
  font-size:0.85rem;
  font-style:italic;
  line-height:1.6;
  color:#6a6a6a;
  margin-bottom:25px;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
  color:#3e3e3e;
  margin:10px 0;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
  margin-bottom:15px;
}

.amp {
  font-size:1.6rem;
  color:#c9a64b;
  margin:10px 0;
}

/* ===== SCRATCH ===== */
.scratch-container {
  display:flex;
  gap:12px;
}

.scratch-box {
  position:relative;
  width:85px;
  height:110px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #d4af37;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Playfair Display', serif;
  background:#fff;
}

canvas {
  position:absolute;
}

.confetti {
  position:fixed;
  width:6px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall {
  to { transform:translateY(100vh) rotate(720deg); }
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent">

<!-- FIRST CARD -->
<div class="section">
  <div class="invite-card" id="card">

    <div class="symbol">ੴ</div>

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>

  </div>
</div>

<!-- SCRATCH -->
<div class="section">
  <div class="invite-card">

    <h2 style="font-family:Playfair Display;">Save the Date</h2>

    <div class="scratch-container">

      <div class="scratch-box"><span>Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span>26</span><canvas></canvas></div>
      <div class="scratch-box"><span>2026</span><canvas></canvas></div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(()=>{
    document.getElementById("envelopeScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
    initScratch();
  },1200);
}

/* CONFETTI */
function confetti(){
  for(let i=0;i<70;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* SCRATCH FIXED (NO SCROLL) */
function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let box=canvas.parentElement;
    canvas.width=box.offsetWidth;
    canvas.height=box.offsetHeight;

    let ctx=canvas.getContext("2d");

    let g=ctx.createLinearGradient(0,0,100,100);
    g.addColorStop(0,"#d4af37");
    g.addColorStop(1,"#f5e6a3");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let count=0,done=false,isScratching=false;

    function scratch(x,y){
      if(done) return;

      ctx.beginPath();
      ctx.arc(x,y,12,0,Math.PI*2);
      ctx.fill();
      count++;

      if(count>100){
        done=true;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confetti();
      }
    }

    canvas.addEventListener("touchstart",()=>{
      isScratching=true;
      document.body.style.overflow="hidden";
    },{passive:false});

    canvas.addEventListener("touchend",()=>{
      isScratching=false;
      document.body.style.overflow="auto";
    });

    canvas.addEventListener("touchmove",e=>{
      if(!isScratching) return;
      e.preventDefault();

      let r=canvas.getBoundingClientRect();
      scratch(
        e.touches[0].clientX-r.left,
        e.touches[0].clientY-r.top
      );
    },{passive:false});
  });
}
</script>

</body>
</html>
