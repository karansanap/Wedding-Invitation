<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#caa85a;
}

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
  overflow-x:hidden;
}

/* VIGNETTE */
body::after {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle,transparent 60%,rgba(0,0,0,0.08));
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}

@keyframes breath {
  50% { transform:scale(1.05); }
}

.envelope-body {
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#a30000,#5c0000);
  border-radius:12px;
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(#7a0000,#3a0000);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.2s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

.seal {
  position:absolute;
  width:70px;
  height:70px;
  background:radial-gradient(circle,#b30000,#4a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
  color:#f1d48a;
}

/* MAIN */
#mainContent { display:none; }

/* SECTION */
.section {
  min-height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  perspective:1000px;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:40px 25px;
  border-radius:18px;
  text-align:center;
  position:relative;

  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");

  box-shadow:
    0 30px 70px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);

  transform:translateY(30px);
  opacity:0;
  animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
  to {
    transform:translateY(0);
    opacity:1;
  }
}

/* LIGHT */
.invite-card::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  background:radial-gradient(circle at 50% 20%,rgba(255,255,255,0.5),transparent 60%);
}

/* GOLD CORNERS */
.invite-card:before,
.invite-card:after {
  pointer-events:none;
}

.invite-card:before {
  content:"";
  position:absolute;
  top:15px;
  left:15px;
  width:40px;
  height:40px;
  border:1px solid var(--gold);
  border-right:none;
  border-bottom:none;
}

.invite-card:after {
  content:"";
  position:absolute;
  bottom:15px;
  right:15px;
  width:40px;
  height:40px;
  border:1px solid var(--gold);
  border-left:none;
  border-top:none;
}

/* TEXT */
.symbol { font-size:26px; margin-bottom:15px; }

.quote {
  font-size:0.85rem;
  font-style:italic;
  color:#6a6a6a;
  margin-bottom:25px;
  line-height:1.6;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
  margin:10px 0;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.amp {
  font-size:1.6rem;
  color:var(--gold);
  margin:10px 0;
}

/* SWIPE */
.swipe {
  position:absolute;
  bottom:15px;
  font-size:0.65rem;
  letter-spacing:2px;
  opacity:0.6;
  animation:move 1.5s infinite;
}

@keyframes move {
  50% { transform:translateY(8px); }
}

/* SCRATCH GRID */
.scratch-wrapper {
  max-width:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  text-align:center;
}

.scratch-labels {
  font-size:0.65rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.scratch-box {
  position:relative;
  height:110px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
}

/* SHIMMER */
.scratch-box::before {
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shine 3s infinite;
}

@keyframes shine {
  to { transform:translateX(100%); }
}

.scratch-box canvas {
  position:absolute;
  inset:0;
}

.scratch-hint {
  font-size:0.6rem;
  letter-spacing:2px;
  color:#b39b6b;
}

/* FIRECRACKER */
.particle {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  animation:burst 1s ease-out forwards;
}

@keyframes burst {
  to {
    transform:translate(var(--x), var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<div class="section">
  <div class="invite-card">
    <div class="symbol">ੴ</div>
    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>
  </div>

  <div class="swipe">SWIPE ↓</div>
</div>

<div class="section">
  <div class="invite-card" id="scratchCard">

    <h2 style="font-family:Playfair Display;">Save the Date</h2>

    <div class="scratch-wrapper">

      <div class="scratch-labels">MONTH</div>
      <div class="scratch-labels">DAY</div>
      <div class="scratch-labels">YEAR</div>

      <div class="scratch-box"><span>Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span>26</span><canvas></canvas></div>
      <div class="scratch-box"><span>2026</span><canvas></canvas></div>

      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },1200);
}

function firecracker(origin){
  for(let i=0;i<35;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*2*Math.PI;
    let dist=60+Math.random()*50;

    p.style.setProperty('--x', Math.cos(angle)*dist+'px');
    p.style.setProperty('--y', Math.sin(angle)*dist+'px');

    p.style.background=`hsl(${Math.random()*40+20},70%,65%)`;

    origin.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let box=canvas.parentElement;

    canvas.width=box.clientWidth;
    canvas.height=box.clientHeight;

    let ctx=canvas.getContext("2d");

    let g=ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g.addColorStop(0,"#d4af37");
    g.addColorStop(1,"#f5e6a3");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let count=0,done=false,isScratching=false;

    function scratch(x,y){
      if(done) return;

      ctx.beginPath();
      ctx.arc(x,y,14,0,Math.PI*2);
      ctx.fill();

      count++;

      if(count>120){
        done=true;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        firecracker(document.getElementById("scratchCard"));
      }
    }

    canvas.addEventListener("touchstart",()=>{
      isScratching=true;
      document.body.style.overflow="hidden";
    },{passive:false});

    canvas.addEventListener("touchend",()=>{
      isScratching=false;
      document.body.style.overflow="auto";
    });

    canvas.addEventListener("touchmove",e=>{
      if(!isScratching) return;
      e.preventDefault();

      let r=canvas.getBoundingClientRect();
      scratch(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
    },{passive:false});
  });
}
</script>

</body>
</html>
