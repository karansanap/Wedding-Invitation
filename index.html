<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<title>Karan ❤️ Pankti</title>  

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">  

<style>  
:root { --gold:#caa85a; }  

body {  
  margin:0;  
  font-family:'Inter', sans-serif;  
  background:  
    linear-gradient(#fffdf8,#f9f2e8),  
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");  

  scroll-snap-type:y mandatory;  
  scroll-behavior:smooth;  
}  

.section {  
  min-height:85vh;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  position:relative;  
  scroll-snap-align:start;  
}  

/* ENVELOPE */  
#envelopeScreen {  
  position:fixed;  
  width:100%;  
  height:100vh;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  z-index:999;  
  background:inherit;  
}  

.envelope {  
  width:360px;  
  height:240px;  
  position:relative;  
  cursor:pointer;  
  animation:breath 3s infinite;  
}  

.envelope::before {  
  content:"";  
  position:absolute;  
  inset:-30px;  
  border-radius:20px;  
  background:radial-gradient(circle, rgba(202,168,90,0.35), transparent 70%);  
  filter:blur(20px);  
  z-index:-1;  
}  

@keyframes breath { 50% { transform:scale(1.05); } }  

.envelope-body {  
  width:100%;  
  height:100%;  
  border-radius:14px;  
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#b8954d);  
  box-shadow:  
    inset 0 2px 6px rgba(255,255,255,0.7),  
    inset 0 -6px 12px rgba(0,0,0,0.3),  
    0 20px 50px rgba(0,0,0,0.3);  
}  

.envelope-body::after {  
  content:"";  
  position:absolute;  
  inset:0;  
  border-radius:14px;  
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);  
  animation:shine 4s infinite;  
}  

@keyframes shine {  
  0% { transform:translateX(-100%); }  
  100% { transform:translateX(100%); }  
}  

.flap {  
  position:absolute;  
  width:100%;  
  height:60%;  
  background:linear-gradient(145deg,#e0c46c,#caa85a,#b8954d);  
  clip-path:polygon(0 0,100% 0,50% 100%);  
  transform-origin:top;  
  transition:1.2s;  
}  

.envelope.open .flap { transform:rotateX(180deg); }  

.seal {  
  position:absolute;  
  width:70px;  
  height:70px;  
  background:radial-gradient(circle,#b30000,#5a0000);  
  border-radius:50%;  
  top:70%;  
  left:50%;  
  transform:translate(-50%,-50%);  
}  

.tap-text {  
  position:absolute;  
  top:48%;  
  left:50%;  
  transform:translate(-50%,-50%);  
  font-size:0.7rem;  
  letter-spacing:3px;  
}  

/* CARD */  
.invite-card {  
  width:92%;  
  max-width:420px;  
  padding:45px 28px;  
  border-radius:18px;  
  text-align:center;  
  background:inherit;  
  position:relative;  
  box-shadow:  
    0 25px 60px rgba(0,0,0,0.15),  
    inset 0 0 0 1px rgba(202,168,90,0.25);  
}  

/* EDGE */  
.invite-card::before,  
.invite-card::after {  
  content:"";  
  position:absolute;  
  inset:0;  
  border-radius:18px;  
  padding:1.5px;  
  background:linear-gradient(120deg,transparent,#caa85a,transparent);  
  -webkit-mask:  
    linear-gradient(#000 0 0) content-box,  
    linear-gradient(#000 0 0);  
  -webkit-mask-composite:xor;  
  mask-composite:exclude;  
}  

.invite-card::before { animation:edgeMove 4s linear infinite; }  
.invite-card::after { animation:edgeMove 6s linear infinite reverse; }  

@keyframes edgeMove {  
  0% { background-position:-200px; }  
  100% { background-position:200px; }  
}  

/* GANPATI */  
.ganpati {  
  width:52px;  
  margin-bottom:15px;  
  fill:url(#goldGradient);  
  animation:ganpatiFloat 3s ease-in-out infinite;  
}  

@keyframes ganpatiFloat {  
  50% { transform:translateY(-6px); }  
}  

/* TEXT */  
.quote { font-size:0.85rem; margin-bottom:25px; font-style:italic; }  
.script { font-family:'Great Vibes'; font-size:2.8rem; }  
.parents { font-size:0.7rem; letter-spacing:2px; color:#8a7a65; }  

/* SWIPE */
.swipe {  
  position:absolute;  
  bottom:10px;  
  font-size:0.7rem;  
  opacity:0.6;  
  animation:swipeMove 1.5s infinite;  
  cursor:pointer;  
}  

@keyframes swipeMove {  
  50% { transform:translateY(10px); }  
}  

/* SAVE DATE */  
.save-title { font-family:'Playfair Display'; margin-bottom:20px; }  

.scratch-wrapper {  
  display:grid;  
  grid-template-columns:repeat(3,1fr);  
  gap:12px;  
  text-align:center;  
}  

.scratch-label {  
  font-size:0.65rem;  
  letter-spacing:3px;  
}  

.scratch-box {  
  position:relative;  
  height:105px;  
  border-radius:14px;  
  overflow:hidden;  
  border:1px solid var(--gold);  
  background:#fff;  
}  

.date-text {  
  position:absolute;  
  top:50%;  
  left:50%;  
  transform:translate(-50%,-50%);  
  font-size:1.5rem;  
  z-index:0;  
}  

canvas {  
  position:absolute;  
  inset:0;  
  width:100%;  
  height:100%;  
  z-index:2;  
}  

.scratch-hint {  
  font-size:0.6rem;  
  letter-spacing:3px;  
}  

/* FIREWORK */  
.particle {  
  position:absolute;  
  width:6px;  
  height:6px;  
  border-radius:50%;  
  animation:burst 1s forwards;  
}  
@keyframes burst {  
  to { transform:translate(var(--x),var(--y)); opacity:0; }  
}  

.video-title {
  font-family:'Playfair Display';
  margin-bottom:20px;
}
</style>  
</head>  

<body>  

<audio id="revealSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1d05.mp3"></audio>

<div id="envelopeScreen">  
  <div class="envelope" onclick="openEnvelope()">  
    <div class="flap"></div>  
    <div class="envelope-body"></div>  
    <div class="tap-text">Tap to Reveal</div>  
    <div class="seal"></div>  
  </div>  
</div>  

<div id="mainContent" style="display:none;">  

<!-- SECTION 1 -->
<div class="section" id="section1">  
  <div class="invite-card">  
    <!-- GANESH SYMBOL REPLACED -->
<img class="ganpati" 
     src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Ganesha_statue.jpg" 
     alt="Lord Ganesh" />

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>
  </div>

  <div class="swipe" onclick="scrollNext()">SWIPE ↓</div>
</div>

<!-- SECTION 2 -->
<div class="section" id="section2">  
  <div class="invite-card" id="scratchCard">

    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">
      <div class="scratch-label">MONTH</div>
      <div class="scratch-label">DAY</div>
      <div class="scratch-label">YEAR</div>

      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>

      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
      <div class="scratch-hint">SCRATCH</div>
    </div>

  </div>

  <!-- ✅ NEW SWIPE -->
  <div class="swipe" onclick="scrollToVideo()">SWIPE ↓</div>
</div>

<!-- SECTION 3 -->
<div class="section" id="section3">
  <div class="invite-card">
    <h2 class="video-title">A Glimpse of Our Journey</h2>

    <video autoplay muted loop playsinline style="width:100%; max-width:420px; border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,0.3);">
      <source src="wedding.mp4" type="video/mp4">
    </video>
  </div>
</div>

</div>  

<script>  
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },1000);
}

function scrollNext(){
  document.getElementById("section2").scrollIntoView({behavior:"smooth"});
}

/* ✅ NEW FUNCTION */
function scrollToVideo(){
  document.getElementById("section3").scrollIntoView({behavior:"smooth"});
}

function firecracker(origin){
  let rect = origin.getBoundingClientRect();

  for(let i=0;i<70;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*2*Math.PI;
    let dist=100+Math.random()*80;

    p.style.left = rect.width/2 + "px";
    p.style.top = rect.height/2 + "px";

    p.style.setProperty('--x',Math.cos(angle)*dist+'px');
    p.style.setProperty('--y',Math.sin(angle)*dist+'px');

    p.style.background=`hsl(${Math.random()*40+20},80%,60%)`;

    origin.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let ctx=canvas.getContext("2d");

    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;

    ctx.fillStyle="#d4af37";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let count=0,done=false;

    canvas.addEventListener("touchmove",e=>{
      e.preventDefault();
      let r=canvas.getBoundingClientRect();
      let x=e.touches[0].clientX-r.left;
      let y=e.touches[0].clientY-r.top;

      ctx.beginPath();
      ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fill();

      count++;

      if(count>120 && !done){
        done=true;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        document.getElementById("revealSound").play();
        firecracker(document.getElementById("scratchCard"));
      }
    },{passive:false});
  });
}
</script>  

</body>  
</html>
