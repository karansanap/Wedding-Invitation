<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f7f0e6;
  overflow-x: hidden;
}

/* ================= ENVELOPE ================= */
#envelopeScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #f7f0e6;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* envelope container */
.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
  perspective: 1000px;
}

/* paper texture */
.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(145deg,#c40000,#7a0000),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  border-radius: 8px;
  box-shadow:
    0 20px 40px rgba(0,0,0,0.25),
    inset 0 0 20px rgba(255,255,255,0.08);
}

/* flap */
.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  background:
    linear-gradient(to bottom,#a00000,#5a0000),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 3;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* wax seal */
.seal {
  position: absolute;
  width: 60px;
  height: 60px;
  background: radial-gradient(circle,#b30000,#4a0000);
  border-radius: 50%;
  top: 70%;
  left: 50%;
  transform: translate(-50%,-50%);
  box-shadow:
    0 8px 15px rgba(0,0,0,0.4),
    inset 0 0 8px rgba(255,255,255,0.2);
  z-index: 4;
}

/* tap text */
.tap-text {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 0.85rem;
  color: #f1d48a;
  letter-spacing: 2px;
  z-index: 5;
}

/* inner letter */
.letter {
  position: absolute;
  width: 90%;
  height: 160%;
  background: #fffaf0;
  top: 20%;
  left: 5%;
  border-radius: 5px;
  transform: translateY(100%);
  transition: transform 1s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.envelope.open .letter {
  transform: translateY(-10%);
}

/* ================= SITE ================= */
#mainContent {
  display: none;
}

/* sections */
.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 40px;
}

/* hero */
.hero {
  background: url("https://images.unsplash.com/photo-1520857014576-2c4f4c972b57") center/cover;
  color: white;
}

/* venue */
.venue {
  background: url("https://images.unsplash.com/photo-1505236858219-8359eb29e329") center/cover;
  color: white;
}

h1 { font-size: 3rem; }
h2 { font-size: 1.4rem; }

</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="envelope-body"></div>

    <div class="letter"></div>

    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>

  </div>
</div>

<!-- WEBSITE -->
<div id="mainContent">

  <div class="section">
    <h2>Two souls...</h2>
    <h2>One beautiful journey...</h2>
  </div>

  <div class="section hero">
    <h1>Karan ❤️ Pankti</h1>
  </div>

  <div class="section">
    <h2>Save The Date</h2>
    <h1>26 November 2026</h1>
    <h2>Mumbai</h2>
  </div>

  <div class="section">
    <h2>Haldi 🌼</h2>
    <h2>Mehendi 🌿</h2>
  </div>

  <div class="section venue">
    <h2>Venue</h2>
    <h1>Royal Palace Garden</h1>
    <p>Mumbai, India</p>
  </div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");

  setTimeout(() => {
    document.getElementById("envelopeScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }, 1200);
}
</script>

</body>
</html>
