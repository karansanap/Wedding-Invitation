<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(#f6efe6,#efe6d8);
}

/* ENVELOPE */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}
@keyframes breath { 50% { transform:scale(1.05); } }

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a);
}

.flap {
  position:absolute;
  width:100%;
  height:60%;
  background:linear-gradient(145deg,#e0c46c,#caa85a);
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1s;
}
.envelope.open .flap { transform:rotateX(180deg); }

.seal {
  position:absolute;
  width:70px;
  height:70px;
  background:radial-gradient(circle,#b30000,#5a0000);
  border-radius:50%;
  top:70%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tap-text {
  position:absolute;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:0.7rem;
  letter-spacing:3px;
}

/* MAIN */
#mainContent { display:none; }

.section {
  min-height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:50px 30px;
  border-radius:18px;
  position:relative;
  text-align:center;

  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");

  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(202,168,90,0.25),
    inset 0 8px 20px rgba(0,0,0,0.05);
}

/* FOIL BORDER */
.invite-card::before,
.invite-card::after {
  content:"";
  position:absolute;
  border-radius:12px;
  padding:1px;
  background:linear-gradient(120deg,#fff3,#caa85a,#fff3);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  animation:foilMove 5s infinite linear;
}
.invite-card::before { inset:12px; }
.invite-card::after { inset:20px; }

@keyframes foilMove {
  0% { background-position:-200px; }
  100% { background-position:200px; }
}

/* GANPATI ICON */
.ganpati {
  width:50px;
  margin:0 auto 15px;
  display:block;
  fill:url(#goldGradient);
  animation:shine 4s infinite linear;
}

@keyframes shine {
  0% { filter:brightness(1); }
  50% { filter:brightness(1.4); }
  100% { filter:brightness(1); }
}

/* TEXT */
.quote {
  font-size:0.85rem;
  font-style:italic;
  color:#6a6a6a;
  margin-bottom:25px;
}

.script {
  font-family:'Great Vibes', cursive;
  font-size:2.8rem;
}

.parents {
  font-size:0.7rem;
  letter-spacing:2px;
  color:#8a7a65;
}

.amp {
  font-size:1.6rem;
  color:var(--gold);
  margin:10px 0;
}

.swipe {
  position:absolute;
  bottom:10px;
  font-size:0.7rem;
  opacity:0.6;
}

/* SAVE DATE (unchanged) */
.save-title { font-family:'Playfair Display'; margin-bottom:30px; }

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  max-width:320px;
  margin:auto;
}

.scratch-box {
  position:relative;
  height:110px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
}

.date-text {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  font-size:1.5rem;
}

.scratch-box canvas {
  position:absolute;
  inset:0;
  z-index:2;
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="envelope-body"></div>
    <div class="tap-text">Tap to Reveal</div>
    <div class="seal"></div>
  </div>
</div>

<div id="mainContent">

<div class="section">
  <div class="invite-card">

    <!-- GANPATI SVG -->
    <svg class="ganpati" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="goldGradient">
          <stop offset="0%" stop-color="#f5e6a3"/>
          <stop offset="50%" stop-color="#caa85a"/>
          <stop offset="100%" stop-color="#f5e6a3"/>
        </linearGradient>
      </defs>
      <path d="M32 4c-8 0-14 6-14 14 0 4 2 8 5 10-2 2-3 5-3 8 0 7 6 12 12 12s12-5 12-12c0-3-1-6-3-8 3-2 5-6 5-10 0-8-6-14-14-14zm0 6c4 0 8 4 8 8s-4 8-8 8-8-4-8-8 4-8 8-8z"/>
    </svg>

    <div class="quote">
      "They alone are called husband and wife,<br>
      who have one soul in two bodies."<br>
      — Guru Amar Das Ji
    </div>

    <div class="script">Karan</div>
    <div class="parents">SON OF MR. & MRS. SANAP</div>

    <div class="amp">&</div>

    <div class="script">Pankti</div>
    <div class="parents">DAUGHTER OF MR. & MRS. JHAVERI</div>

  </div>

  <div class="swipe">SWIPE ↓</div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
  },1000);
}
</script>

</body>
</html>
