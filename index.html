
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karan ❤️ Pankti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold:#caa85a; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:
    linear-gradient(#fffdf8,#f9f2e8),
    url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

.section {
  min-height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  scroll-snap-align:start;
}

/* ENVELOPE (unchanged) */
#envelopeScreen {
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  background:inherit;
}

.envelope {
  width:360px;
  height:240px;
  position:relative;
  cursor:pointer;
  animation:breath 3s infinite;
}
@keyframes breath { 50% { transform:scale(1.05); } }

.envelope-body {
  width:100%;
  height:100%;
  border-radius:14px;
  background:linear-gradient(145deg,#f5e6a3,#e0c46c,#caa85a,#b8954d);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.7),
    inset 0 -6px 12px rgba(0,0,0,0.3),
    0 20px 50px rgba(0,0,0,0.3);
}

/* CARD */
.invite-card {
  width:92%;
  max-width:420px;
  padding:45px 28px;
  border-radius:18px;
  text-align:center;
  position:relative;
  background:inherit;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(202,168,90,0.25);
}

/* 💎 FIXED EDGE ALIGNMENT */
.invite-card::before,
.invite-card::after {
  content:"";
  position:absolute;
  inset:0;               /* FIX: perfect alignment */
  border-radius:18px;
  padding:2px;
  background:linear-gradient(120deg,transparent,#caa85a,transparent);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

.invite-card::before {
  animation:foilMove 5s linear infinite;
}
.invite-card::after {
  animation:foilMove 7s linear infinite reverse;
}

@keyframes foilMove {
  0% { background-position:-200px; }
  100% { background-position:200px; }
}

/* SAVE DATE */
.save-title {
  font-family:'Playfair Display';
  margin-bottom:20px;
}

.scratch-wrapper {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  text-align:center;
}

.scratch-box {
  position:relative;
  height:105px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--gold);
  background:#fff;
}

.date-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:1.5rem;
  z-index:0;
}

canvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:2;
}

/* 🎆 FIREWORK */
.particle {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:burst 1s forwards;
}

@keyframes burst {
  to {
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<div id="envelopeScreen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="envelope-body"></div>
  </div>
</div>

<div id="mainContent" style="display:none;">

<div class="section">
  <div class="invite-card">
    <h2 class="save-title">Save the Date</h2>

    <div class="scratch-wrapper">

      <div class="scratch-box"><span class="date-text">Nov</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">26</span><canvas></canvas></div>
      <div class="scratch-box"><span class="date-text">2026</span><canvas></canvas></div>

    </div>

  </div>
</div>

</div>

<script>
function openEnvelope(){
  document.querySelector(".envelope").classList.add("open");
  setTimeout(()=>{
    envelopeScreen.style.display="none";
    mainContent.style.display="block";
    initScratch();
  },800);
}

/* 🎆 FIXED FIRECRACKER */
function firecracker(origin){
  let rect = origin.getBoundingClientRect();

  for(let i=0;i<70;i++){
    let p=document.createElement("div");
    p.className="particle";

    let angle=Math.random()*Math.PI*2;
    let dist=80+Math.random()*80;

    p.style.left = rect.width/2 + "px";
    p.style.top = rect.height/2 + "px";

    p.style.setProperty('--x', Math.cos(angle)*dist + "px");
    p.style.setProperty('--y', Math.sin(angle)*dist + "px");

    p.style.background = `hsl(${Math.random()*40+20},80%,60%)`;

    origin.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

/* SCRATCH FIX */
function initScratch(){
  document.querySelectorAll("canvas").forEach(canvas=>{
    let ctx=canvas.getContext("2d");

    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;

    ctx.fillStyle="#d4af37";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.globalCompositeOperation="destination-out";

    let revealed=false;
    let progress=0;

    canvas.addEventListener("touchmove",e=>{
      e.preventDefault();

      let r=canvas.getBoundingClientRect();
      let x=e.touches[0].clientX-r.left;
      let y=e.touches[0].clientY-r.top;

      ctx.beginPath();
      ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fill();

      progress++;

      if(progress>120 && !revealed){
        revealed=true;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        firecracker(document.querySelector(".scratch-wrapper"));
      }

    },{passive:false});
  });
}
</script>

</body>
</html>
